<title>AM7 BRIEFING</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #0a0a0a;
  --paper: #f2ede6;
  --accent: #c8381a;
  --muted: #8a7f74;
  --line: #d4cdc4;
  --sat: env(safe-area-inset-top, 0px);
  --sab: env(safe-area-inset-bottom, 0px);
  --sal: env(safe-area-inset-left, 0px);
  --sar: env(safe-area-inset-right, 0px);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html { height: 100%; }

body {
  height: 100%;
  background: var(--paper);
  color: var(--ink);
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 300;
  overflow-x: hidden;
  /* ノッチ対応 */
  padding-top: var(--sat);
  padding-left: var(--sal);
  padding-right: var(--sar);
}

/* ── HEADER ── */
header {
  background: var(--paper);
  border-bottom: 3px solid var(--ink);
  padding: 0 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  height: 58px;
}
.masthead {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(22px, 5.5vw, 38px);
  line-height: 1;
  letter-spacing: 0.02em;
}
.masthead em { color: var(--accent); font-style: normal; }
.header-right { text-align: right; }
.header-date {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: .12em;
  color: var(--muted);
  text-transform: uppercase;
  line-height: 1.6;
}
.header-updated {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  color: var(--muted);
}

/* ── TICKER ── */
.ticker {
  background: var(--ink);
  color: var(--paper);
  overflow: hidden;
  white-space: nowrap;
  height: 28px;
  display: flex;
  align-items: center;
}
.ticker-inner {
  display: inline-block;
  animation: ticker 60s linear infinite;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: .1em;
  padding-left: 100%;
}

/* ── NOW PLAYING BAR ── */
#nowPlayingBar {
  background: var(--ink);
  color: var(--paper);
  padding: 9px 16px;
  display: none;
  align-items: center;
  gap: 10px;
  position: sticky;
  top: 58px;
  z-index: 99;
}
#nowPlayingBar.show { display: flex; }
.pdot {
  width: 7px; height: 7px;
  background: var(--accent);
  border-radius: 50%;
  flex-shrink: 0;
  animation: pdot 1.4s ease-in-out infinite;
}
#npTitle {
  flex: 1;
  font-size: 12px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
#npIdx {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: #666;
  flex-shrink: 0;
}

/* ── PROGRESS LINE ── */
#progressLine {
  height: 3px;
  background: var(--accent);
  width: 0%;
  transition: width .3s;
  position: sticky;
  top: calc(58px);
  z-index: 98;
}

/* ── FILTER TABS ── */
.filter-wrap {
  overflow-x: auto;
  border-bottom: 1px solid var(--line);
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior-x: contain;
}
.filter-wrap::-webkit-scrollbar { display: none; }
.filter-tabs { display: flex; white-space: nowrap; }
.ftab {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: .1em;
  text-transform: uppercase;
  border: none;
  border-bottom: 2.5px solid transparent;
  border-right: 1px solid var(--line);
  background: transparent;
  color: var(--muted);
  padding: 11px 14px;
  cursor: pointer;
  transition: all .15s;
  flex-shrink: 0;
}
.ftab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ── FEED ── */
#feedHeader {
  padding: 11px 16px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  gap: 10px;
}
.feed-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 17px;
  letter-spacing: .05em;
}
.badge {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  background: var(--accent);
  color: #fff;
  padding: 2px 6px;
  letter-spacing: .1em;
}

/* ── STATES ── */
.loading-state, .empty-state {
  padding: 60px 20px;
  text-align: center;
}
.spinner {
  width: 30px; height: 30px;
  border: 2px solid var(--line);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .8s linear infinite;
  margin: 0 auto 14px;
}
.state-msg {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  letter-spacing: .08em;
  line-height: 2;
}
.empty-icon { font-size: 44px; opacity: .4; margin-bottom: 14px; }

/* ── NEWS CARD ── */
.news-card {
  padding: 16px 16px 16px 19px;
  border-bottom: 1px solid var(--line);
  border-left: 3px solid transparent;
  cursor: pointer;
  transition: background .1s;
  position: relative;
  user-select: none;
}
.news-card:active { background: rgba(200,56,26,.05); }
.news-card.reading {
  background: rgba(255,213,79,.13);
  border-left-color: var(--accent);
}
.card-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px;
  color: var(--line);
  position: absolute;
  right: 13px; top: 13px;
  line-height: 1;
}
.card-meta {
  display: flex;
  align-items: center;
  gap: 7px;
  margin-bottom: 6px;
  flex-wrap: wrap;
}
.card-cat {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: .15em;
  text-transform: uppercase;
  font-weight: 400;
}
.card-src {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  color: var(--muted);
  background: var(--line);
  padding: 1px 5px;
}
.card-title {
  font-size: 15px;
  font-weight: 500;
  line-height: 1.5;
  margin-bottom: 6px;
  padding-right: 32px;
}
.card-summary {
  font-size: 12px;
  line-height: 1.9;
  color: #444;
}

/* ── BOTTOM BAR ── */
#bottomBar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--paper);
  border-top: 2px solid var(--ink);
  padding: 10px 14px;
  padding-bottom: calc(10px + var(--sab));
  display: flex;
  gap: 8px;
  z-index: 100;
  align-items: stretch;
}
.bb-icon {
  font-family: 'DM Mono', monospace;
  font-size: 18px;
  border: 1.5px solid var(--line);
  background: transparent;
  color: var(--ink);
  padding: 0 12px;
  cursor: pointer;
  border-radius: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .15s;
  min-height: 46px;
}
.bb-icon:active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
.bb-btn {
  flex: 1;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: .12em;
  text-transform: uppercase;
  border: 1.5px solid var(--ink);
  background: transparent;
  color: var(--ink);
  padding: 0 10px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  transition: all .15s;
  min-height: 46px;
}
.bb-btn:active { background: var(--ink); color: var(--paper); }
.bb-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.bb-btn.primary:active { background: #a02e14; }
.bb-btn:disabled { opacity: .35; pointer-events: none; }

/* フィード下余白（ボトムバー分）*/
#feedWrap { padding-bottom: calc(74px + var(--sab)); }

/* ── MODAL ── */
.modal-bg {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.72);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  z-index: 200;
  display: flex;
  align-items: flex-end;
  padding: 0;
  transition: opacity .2s;
}
.modal-bg.hidden { display: none; }
.modal-sheet {
  background: var(--paper);
  width: 100%;
  padding: 28px 22px calc(24px + var(--sab));
  border-top: 3px solid var(--ink);
  max-height: 90vh;
  overflow-y: auto;
}
.modal-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 26px;
  letter-spacing: .05em;
  margin-bottom: 6px;
}
.modal-sub {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: .07em;
  line-height: 1.9;
  margin-bottom: 20px;
}
.modal-input {
  width: 100%;
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  border: 1.5px solid var(--ink);
  background: transparent;
  color: var(--ink);
  padding: 12px 14px;
  outline: none;
  letter-spacing: .04em;
  margin-bottom: 14px;
}
.modal-input:focus { border-color: var(--accent); }
.modal-actions { display: flex; gap: 10px; }
.modal-btn {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: .12em;
  text-transform: uppercase;
  border: 1.5px solid var(--ink);
  background: transparent;
  color: var(--ink);
  padding: 13px 16px;
  cursor: pointer;
  flex: 1;
}
.modal-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }

/* ── VOICE SHEET ── */
#voiceSheet {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.72);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  z-index: 200;
  display: flex;
  align-items: flex-end;
}
#voiceSheet.hidden { display: none; }
.voice-inner {
  background: var(--paper);
  width: 100%;
  padding: 24px 22px calc(20px + var(--sab));
  border-top: 3px solid var(--ink);
}
.voice-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: .05em;
  margin-bottom: 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.voice-close {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  border: 1px solid var(--line);
  background: transparent;
  color: var(--muted);
  padding: 4px 10px;
  cursor: pointer;
}
.voice-rows { display: flex; flex-direction: column; gap: 20px; }
.voice-row label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: .1em;
  text-transform: uppercase;
  display: block;
  margin-bottom: 10px;
}
input[type=range] {
  width: 100%;
  accent-color: var(--accent);
  height: 4px;
}

/* ── ANIMATIONS ── */
@keyframes spin   { to { transform: rotate(360deg); } }
@keyframes ticker { from { transform: translateX(0); } to { transform: translateX(-50%); } }
@keyframes pdot   { 0%,100% { opacity:1; } 50% { opacity:.25; } }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="masthead">AM<em>7</em>_BRIEFING</div>
  <div class="header-right">
    <div class="header-date" id="headerDate"></div>
    <div class="header-updated" id="lastUpdated">—</div>
  </div>
</header>

<!-- PROGRESS LINE -->
<div id="progressLine"></div>

<!-- TICKER -->
<div class="ticker">
  <div class="ticker-inner" id="tickerInner">
    ニュースを取得中...&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;LOADING NEWS...&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;ニュースを取得中...&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;LOADING NEWS...
  </div>
</div>

<!-- NOW PLAYING -->
<div id="nowPlayingBar">
  <span class="pdot"></span>
  <span id="npTitle">—</span>
  <span id="npIdx"></span>

<script>
// ════════════════════════════════════
// CONSTANTS（TDZ防止: fetchNews/initより前に全定数を宣言）
// ════════════════════════════════════
const API_URL      = 'https://api.anthropic.com/v1/messages';
const CAT_COLOR    = {
  '国内':'#c8381a','国際':'#1a6bc8','経済':'#2a9d44',
  '社会':'#7b4fc8','テクノロジー':'#c87b1a','スポーツ':'#c8a01a'
};
const CACHE_KEY    = 'am7_cache';
const todayDateStr = () => new Date().toLocaleDateString('ja-JP');
const isIOS        = /iPad|iPhone|iPod/.test(navigator.userAgent);
const isAndroid    = /Android/.test(navigator.userAgent);

// ════════════════════════════════════
// STATE（全グローバル変数をここで宣言してTDZを防ぐ）
// ════════════════════════════════════
let allNews = [], filteredNews = [];
let isReading = false;
let currentReadingIdx = -1;
let _resumeTimer = null;
let _wakeLock    = null;
let _audioCtx    = null;
let _silentSrc   = null;
let ttsLang      = 'ja-JP';  // 実際の値はinit()内で localStorage から復元


// ════════════════════════════════════
// INIT
// ════════════════════════════════════
(function init() {
  // 日付
  const now  = new Date();
  document.getElementById('headerDate').textContent =
    now.toLocaleDateString('ja-JP',{month:'short',day:'numeric',weekday:'short'}).toUpperCase();

  // APIキー復元
  const key = localStorage.getItem('am7_key');
  if (key) document.getElementById('apiKeyInput').value = key;
  else setTimeout(openKeyModal, 500);

  // 音声設定復元
  const vRate = localStorage.getItem('am7_rate');
  const vVol  = localStorage.getItem('am7_vol');
  if (vRate) {
    document.getElementById('rateSlider').value = vRate;
    document.getElementById('rateLabel').textContent = '読み上げ速度: ' + parseFloat(vRate).toFixed(1) + 'x';
  }
  if (vVol) {
    document.getElementById('volSlider').value = vVol;
    document.getElementById('volLabel').textContent = '音量: ' + Math.round(vVol * 100) + '%';
  }
  // 言語設定復元（STATE で 'ja-JP' に初期化済み、ここで localStorage の値を適用）
  ttsLang = localStorage.getItem('am7_lang') || 'ja-JP';
  updateLangUI();

  // Service Worker 登録
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }
})();

// ════════════════════════════════════
// MODAL
// ════════════════════════════════════
function openKeyModal()  { document.getElementById('keyModal').classList.remove('hidden'); }
function openVoice()     { document.getElementById('voiceSheet').classList.remove('hidden'); }
function closeModal(id)  { document.getElementById(id).classList.add('hidden'); }
function bgClose(e, id)  { if (e.target === document.getElementById(id)) closeModal(id); }

function saveKey() {
  const v = document.getElementById('apiKeyInput').value.trim();
  if (v) localStorage.setItem('am7_key', v);
  closeModal('keyModal');
}

// ttsLang は STATE セクションで宣言済み。init() で localStorage から復元する。

function setLang(lang) {
  ttsLang = lang;
  localStorage.setItem('am7_lang', lang);
  updateLangUI();
}

function updateLangUI() {
  const ja = document.getElementById('langJA');
  const en = document.getElementById('langEN');
  if (!ja || !en) return;
  const isJA = ttsLang === 'ja-JP';
  ja.style.background    = isJA  ? 'var(--ink)' : 'transparent';
  ja.style.color         = isJA  ? 'var(--paper)' : 'var(--ink)';
  ja.style.borderColor   = isJA  ? 'var(--ink)' : 'var(--line)';
  en.style.background    = !isJA ? 'var(--ink)' : 'transparent';
  en.style.color         = !isJA ? 'var(--paper)' : 'var(--ink)';
  en.style.borderColor   = !isJA ? 'var(--ink)' : 'var(--line)';
}

function saveVoice() {
  localStorage.setItem('am7_rate', document.getElementById('rateSlider').value);
  localStorage.setItem('am7_vol',  document.getElementById('volSlider').value);
}

// ════════════════════════════════════
// HELPERS
// ════════════════════════════════════
function extractText(content) {
  if (!Array.isArray(content)) return '';
  return content.filter(b => b.type === 'text').map(b => b.text).join('').trim();
}

function safeParseNews(raw) {
  if (!raw) throw new Error('レスポンスが空です');

  // Step1: コードブロック・前後テキストを除去して直接パース
  let s = raw.replace(/```(?:json)?\n?/gi, '').trim();
  try { const r = JSON.parse(s); if (r && r.news) return r; } catch {}

  // Step2: {"news":[...]} を最長マッチで抽出
  const m = s.match(/\{[^{}]*"news"\s*:\s*\[([\s\S]*?)\][^{}]*\}/);
  if (m) {
    try { const r = JSON.parse(m[0]); if (r && r.news) return r; } catch {}
  }

  // Step3: "news": [...] の配列部分だけ取り出して再構成
  const am = s.match(/"news"\s*:\s*(\[[\s\S]*?\](?=\s*[,}]|\s*$))/);
  if (am) {
    // 途中で切れた配列を修復（最後の完全なオブジェクトまで）
    let arr = am[1];
    // 末尾の不完全オブジェクトを除去して閉じる
    arr = arr.replace(/,?\s*\{[^{}]*$/, '').replace(/,\s*$/, '') + ']';
    try {
      const parsed = JSON.parse(arr);
      if (Array.isArray(parsed) && parsed.length > 0) return { news: parsed };
    } catch {}
    // それでも失敗なら完全なオブジェクトだけ抽出
    const items = [];
    const objRe = /\{[^{}]*"category"[^{}]*"title"[^{}]*\}/g;
    let obj;
    while ((obj = objRe.exec(s)) !== null) {
      try { items.push(JSON.parse(obj[0])); } catch {}
    }
    if (items.length > 0) return { news: items };
  }

  // Step4: 個別のニュースオブジェクトを総当たりで拾う（最終手段）
  const items = [];
  const objRe = /\{[^{}]*"category"[^{}]*"title"[^{}]*\}/g;
  let obj;
  while ((obj = objRe.exec(s)) !== null) {
    try { items.push(JSON.parse(obj[0])); } catch {}
  }
  if (items.length > 0) { console.log('[AM7] Step4で', items.length, '件抽出'); return { news: items }; }

  console.error('[AM7] parse failed:', s.slice(0, 300));
  throw new Error('JSONパース失敗: ' + s.slice(0, 80));
}

function setMsg(msg) {
  const el = document.querySelector('.state-msg');
  if (el) el.textContent = msg;
}

// ════════════════════════════════════
// CACHE HELPERS（当日キャッシュ）
// CACHE_KEY / todayDateStr は CONSTANTS セクションで宣言済み
// ════════════════════════════════════

function loadCache() {
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if (!raw) return null;
    const c = JSON.parse(raw);
    // 当日のキャッシュのみ有効
    if (c.date === todayDateStr()) return c.news;
  } catch {}
  return null;
}

function saveCache(news) {
  localStorage.setItem(CACHE_KEY, JSON.stringify({ date: todayDateStr(), news }));
}

// ════════════════════════════════════
// FETCH NEWS
// ════════════════════════════════════
async function fetchNews(forceRefresh = false) {
  const key = localStorage.getItem('am7_key') || '';
  if (!key) { openKeyModal(); return; }

  // ── キャッシュチェック ──────────────────────
  if (!forceRefresh) {
    const cached = loadCache();
    if (cached) {
      // キャッシュに title_en がない場合（旧形式）は再取得
      const hasEnglish = cached.length > 0 && cached[0].title_en;
      if (hasEnglish) {
        allNews = cached;
        filteredNews = [...allNews];
        renderNews(filteredNews);
        updateTicker(allNews);
        document.getElementById('readAllBtn').disabled = false;
        document.getElementById('lastUpdated').textContent = '今日取得済（キャッシュ）';
        return;
      }
      console.log('[AM7] キャッシュに英語フィールドなし。再取得します');
    }
  }

  const btn = document.getElementById('fetchBtn');
  btn.disabled = true;
  btn.innerHTML = `
    <div style="width:13px;height:13px;border:1.5px solid rgba(255,255,255,.4);
      border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0"></div>取得中`;

  document.getElementById('feedWrap').innerHTML = `
    <div class="loading-state">
      <div class="spinner"></div>
      <div class="state-msg" id="loadingMsg">ウェブを検索中...</div>
      <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-top:10px;letter-spacing:.08em;" id="loadingTimer"></div>
    </div>`;

  // 経過秒数カウンター（取得中に止まってないことを表示）
  let _loadSec = 0;
  const _loadTimer = setInterval(() => {
    _loadSec++;
    const el = document.getElementById('loadingTimer');
    if (el) el.textContent = `${_loadSec}秒経過 / 最大60秒`;
    if (_loadSec >= 60) clearInterval(_loadTimer);
  }, 1000);

  stopReading();

  const today = new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric'});

  // ── システムプロンプト ───────────────────────
  const system = `あなたはニュースキュレーターです。
ウェブ検索で本日(${today})のニュースを収集し、以下のJSON形式のみで返してください。
説明文・謝罪文・コードブロックは一切不要です。JSONのみ出力してください。

{"news":[{"id":1,"category":"カテゴリー名","title":"30字以内の日本語見出し","title_en":"English headline","summary":"80字以内の日本語要約","summary_en":"English summary","source":"媒体名"}]}

【条件】
- カテゴリーは 国内・国際・経済・社会・テクノロジー・スポーツ の6種類
- 各カテゴリーで見つかった記事を1件以上できるだけ多く収集する（上限なし）
- 記事が見つからないカテゴリーは省略してよい
- NHK・朝日・読売・毎日・産経・共同通信・日経・BBC・Reuters・AP・AFP・CNN など主要メディアを優先
- 明らかに信頼性の低い情報源（SNS・匿名サイト）は避ける
- title_en と summary_en は必ず自然な英語で記述すること
- 記事数が少なくても必ずJSONで返すこと。絶対に空配列 {"news":[]} を返してはいけない
- 検索結果が少ない場合は過去数日以内のニュースで補完してよい`;

  const userMsg = `${today}の主要ニュースを各カテゴリーから1件以上収集してJSON形式で返してください。title_en と summary_en の英語フィールドも必ず含めてください。`;

  // タイムアウト付きfetch（デフォルト60秒）
  // AbortSignal は環境によってクローン不可のため Promise.race で実装
  async function fetchWithTimeout(url, options, timeoutMs = 60000) {
    const timeoutPromise = new Promise((_, reject) =>
      setTimeout(() => reject(new Error('タイムアウト（60秒）。通信環境を確認して再試行してください。')), timeoutMs)
    );
    return Promise.race([fetch(url, options), timeoutPromise]);
  }

  async function callAPI(messages) {
    const bodyObj = {
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 6000,  // title_en/summary_en 追加分
      tools: [{ type: 'web_search_20250305', name: 'web_search' }],
      system,
      messages
    };
    const reqOpts = {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify(bodyObj)
    };

    const res = await fetchWithTimeout(API_URL, reqOpts, 60000);

    if (res.status === 429) {
      const retryAfter = parseInt(res.headers.get('retry-after') || '15', 10);
      console.warn(`[AM7] 429 レート制限検出。${retryAfter}秒待機して再試行`);
      setMsg(`レート制限中。${retryAfter}秒後に再試行...`);
      await new Promise(r => setTimeout(r, (retryAfter + 1) * 1000));
      const res2 = await fetchWithTimeout(API_URL, reqOpts, 60000);
      if (!res2.ok) {
        const txt2 = await res2.text();
        throw new Error(`API ${res2.status}（再試行後）: ${txt2}`);
      }
      return res2.json();
    }
    if (!res.ok) {
      const txt = await res.text();
      throw new Error(`API ${res.status}: ${txt}`);
    }
    return res.json();
  }

  // web_search_20250305 はサーバーサイド実行型ツール。
  // モデルが tool_use を返した時点で検索は完了しており、
  // 結果は tool_use ブロックの content に含まれている。
  // tool_result を返す必要はなく、assistant の応答をそのまま
  // 会話履歴に追加して次のターンで JSON 生成を促すだけでよい。
  function buildToolResults(contentBlocks) {
    return contentBlocks
      .filter(b => b.type === 'tool_use')
      .map(b => ({
        type: 'tool_result',
        tool_use_id: b.id,
        content: [{ type: 'text', text: 'Search completed.' }]
      }));
  }

  // マルチターンでfinalTextを取得（最大5ターン）
  async function fetchFinalText() {
    const messages = [{ role: 'user', content: userMsg }];

    for (let turn = 1; turn <= 5; turn++) {
      console.log(`[AM7] Turn${turn} 開始`);
      setMsg(turn === 1 ? 'ウェブを検索中...' : turn <= 3 ? '検索結果を要約中...' : '最終処理中...');

      const data = await callAPI(messages);
      const types = data.content?.map(b => b.type) || [];
      const text  = extractText(data.content);
      console.log(`[AM7] Turn${turn} stop_reason:${data.stop_reason} types:[${types}] text_len:${text.length}`);

      // APIレベルのエラー
      if (data.error) throw new Error('APIエラー: ' + JSON.stringify(data.error));

      // end_turn → テキスト返却
      if (data.stop_reason === 'end_turn') {
        if (text) return text;
        throw new Error(`Turn${turn}: レスポンスのテキストが空です`);
      }

      // tool_use → 会話履歴に追加して続行
      if (data.stop_reason === 'tool_use') {
        // assistant の応答（tool_use を含む）を履歴に追加
        messages.push({ role: 'assistant', content: data.content });
        // tool_result を返してモデルに JSON 生成を促す
        const toolResults = buildToolResults(data.content);
        console.log(`[AM7] Turn${turn} tool_results:`, JSON.stringify(toolResults));
        messages.push({ role: 'user', content: toolResults });
        continue;
      }

      // max_tokens 超過など
      if (data.stop_reason === 'max_tokens') {
        // 途中まで生成されたテキストがあれば返す（safeParseNews で修復）
        if (text) { console.warn('[AM7] max_tokens超過。部分テキストで続行'); return text; }
        throw new Error('max_tokens超過かつテキストが空です');
      }

      // その他の stop_reason
      if (text) return text;
      throw new Error(`予期しないstop_reason: ${data.stop_reason}`);
    }

    throw new Error('最大ターン数(5)を超えました');
  }

  try {
    const finalText = await fetchFinalText();
    console.log('[AM7] finalText length:', finalText?.length, 'preview:', finalText?.slice(0,100));

    if (!finalText) throw new Error('AIからの応答が空です');

    let parsed = safeParseNews(finalText);

    // 空配列が返ってきた場合は条件を緩めて1回リトライ
    if (!parsed.news || parsed.news.length === 0) {
      console.warn('[AM7] 空配列検出。条件緩和してリトライ');
      setMsg('条件を緩めて再取得中...');
      const retryMsg = `${today}のニュースを何でもよいので10件以上JSON形式で返してください。{"news":[...]}の形式で。`;
      const retryData = await callAPI([{ role: 'user', content: retryMsg }]);
      const retryText = extractText(retryData.content);
      if (retryText) {
        try { parsed = safeParseNews(retryText); } catch(e) { /* 元のまま続行 */ }
      }
    }

    allNews = parsed.news || [];
    if (!allNews.length) throw new Error('ニュースデータが空です。しばらく時間をおいて再試行してください。');

    console.log('[AM7] 取得成功:', allNews.length, '件');
    saveCache(allNews);
    filteredNews = [...allNews];
    renderNews(filteredNews);
    updateTicker(allNews);

    const now = new Date();
    document.getElementById('lastUpdated').textContent =
      now.getHours() + ':' + String(now.getMinutes()).padStart(2,'0') + ' 更新';
    document.getElementById('readAllBtn').disabled = false;

  } catch (err) {
    console.error('[AM7] 取得エラー:', err);
    document.getElementById('feedWrap').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">⚠️</div>
        <div class="state-msg">取得に失敗しました<br>
          <span style="font-size:10px;display:block;margin-top:8px;color:var(--accent)">${err.message.slice(0,150)}</span>
        </div>
      </div>`;
  } finally {
    // 成功・失敗・例外いずれでも必ずボタンを元に戻す
    console.log('[AM7] finally: ボタンリセット');
    clearInterval(_loadTimer);
    btn.disabled = false;
    btn.innerHTML = `
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="23 4 23 10 17 10"/>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>取得`;
  }
}

// ════════════════════════════════════
// RENDER
// ════════════════════════════════════
function renderNews(news) {
  document.getElementById('newsCount').textContent = news.length;
  if (!news.length) {
    document.getElementById('feedWrap').innerHTML =
      '<div class="empty-state"><div class="state-msg">該当記事なし</div></div>';
    return;
  }
  document.getElementById('feedWrap').innerHTML = news.map((item, i) => `
    <div class="news-card" id="nc-${i}" onclick="readItem(${i})">
      <div class="card-num">${String(i+1).padStart(2,'0')}</div>
      <div class="card-meta">
        <span class="card-cat" style="color:${CAT_COLOR[item.category]||'var(--accent)'}">
          ${item.category}
        </span>
        <span class="card-src">${item.source||''}</span>
      </div>
      <div class="card-title">${item.title}</div>
      <div class="card-summary">${item.summary}</div>
    </div>
  `).join('');
}

function updateTicker(news) {
  const t = news.map(n=>`[${n.category}] ${n.title}`).join('　▶　');
  // 2重にしてループが自然になるように
  document.getElementById('tickerInner').textContent = t + '　　　　　' + t;
}

// ════════════════════════════════════
// FILTER
// ════════════════════════════════════
function filterNews(cat, el) {
  document.querySelectorAll('.ftab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  filteredNews = cat === 'all' ? [...allNews] : allNews.filter(n => n.category === cat);
  renderNews(filteredNews);
  stopReading();
}

// ════════════════════════════════════
// TTS + バックグラウンド再生対応
// ════════════════════════════════════

// ── OS判定 ───────────────────────────────────
// isIOS / isAndroid は CONSTANTS セクションで宣言済み

// ════════════════════════════════════════════
// バックグラウンド再生対応
//
// Android Chrome の制約:
//   Web Speech API はバックグラウンドで停止する。
//   これはブラウザの仕様であり完全な回避は不可能。
//
// 対策の組み合わせ:
//   1. Wake Lock API  … 読み上げ中は画面オフを防止（Android Chrome 84+対応）
//   2. 無音 AudioContext … iOS向けオーディオセッション維持（iOS Safari対応）
//   3. 画面復帰時の自動再開 … 万一止まった場合のフォールバック
// ════════════════════════════════════════════

// ── 1. Wake Lock API（Android Chrome 84+ / iOS Safari 16.4+）
// 読み上げ中は端末の画面オフを防止する
// _wakeLock は STATE セクションで宣言済み

async function requestWakeLock() {
  if (!('wakeLock' in navigator)) {
    console.log('[AM7] WakeLock非対応端末');
    return;
  }
  // すでに有効なWakeLockがあれば再取得しない
  if (_wakeLock && _wakeLock.released === false) return;
  try {
    _wakeLock = await navigator.wakeLock.request('screen');
    console.log('[AM7] WakeLock取得成功');
    _wakeLock.addEventListener('release', () => {
      console.log('[AM7] WakeLock解放。読み上げ中なら再取得');
      _wakeLock = null;
      // 読み上げ中かつ画面が表示状態なら即再取得
      if (isReading && document.visibilityState === 'visible') {
        requestWakeLock();
      }
    });
  } catch(e) {
    console.warn('[AM7] WakeLock取得失敗:', e.message);
  }
}

function releaseWakeLock() {
  if (_wakeLock) {
    _wakeLock.release().catch(() => {});
    _wakeLock = null;
    console.log('[AM7] WakeLock解放');
  }
}

// visibilitychange でWakeLockを再取得（一時的に解放される場合の対応）
document.addEventListener('visibilitychange', async () => {
  if (document.visibilityState === 'visible' && isReading && !_wakeLock) {
    await requestWakeLock();
  }
});

// ── 2. 無音 AudioContext（iOS Safari 向けオーディオセッション維持）
// _audioCtx / _silentSrc は STATE セクションで宣言済み

function startSilentAudio() {
  try {
    if (!_audioCtx) {
      _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (_audioCtx.state === 'suspended') _audioCtx.resume();
    if (_silentSrc) { try { _silentSrc.stop(); } catch(e) {} _silentSrc = null; }
    const buf = _audioCtx.createBuffer(1, _audioCtx.sampleRate * 2, _audioCtx.sampleRate);
    _silentSrc = _audioCtx.createBufferSource();
    _silentSrc.buffer = buf;
    _silentSrc.loop = true;
    _silentSrc.connect(_audioCtx.destination);
    _silentSrc.start();
  } catch(e) { console.warn('[AM7] silent audio:', e); }
}

function stopSilentAudio() {
  try { if (_silentSrc) { _silentSrc.stop(); _silentSrc = null; } } catch(e) {}
  try { if (_audioCtx)  { _audioCtx.suspend(); } } catch(e) {}
}

// ── 3. Media Session API（ロック画面・通知センターのコントロール）
function setupMediaSession(title) {
  if (!('mediaSession' in navigator)) return;
  try {
    navigator.mediaSession.metadata = new MediaMetadata({
      title:  title || 'AM7 BRIEFING',
      artist: 'ニュース読み上げ中',
      album:  'AM7 BRIEFING',
    });
    navigator.mediaSession.setActionHandler('pause',         () => stopReading());
    navigator.mediaSession.setActionHandler('stop',          () => stopReading());
    navigator.mediaSession.setActionHandler('nexttrack',     () => {
      if (isReading && currentReadingIdx + 1 < filteredNews.length) {
        window.speechSynthesis.cancel();
        speakItem(currentReadingIdx + 1);
      }
    });
    navigator.mediaSession.setActionHandler('previoustrack', () => {
      if (isReading && currentReadingIdx > 0) {
        window.speechSynthesis.cancel();
        speakItem(currentReadingIdx - 1);
      }
    });
    navigator.mediaSession.playbackState = 'playing';
  } catch(e) { console.warn('[AM7] mediaSession:', e); }
}

function clearMediaSession() {
  if (!('mediaSession' in navigator)) return;
  try {
    navigator.mediaSession.playbackState = 'none';
    ['pause','stop','nexttrack','previoustrack'].forEach(a => {
      try { navigator.mediaSession.setActionHandler(a, null); } catch(e) {}
    });
  } catch(e) {}
}

// ── 4. 画面復帰時の自動再開（フォールバック）
// currentReadingIdx / _resumeTimer は STATE セクションで宣言済み

function scheduleResume() {
  clearTimeout(_resumeTimer);
  _resumeTimer = setTimeout(() => {
    if (!isReading) return;
    if (!window.speechSynthesis.speaking && !window.speechSynthesis.pending) {
      console.log('[AM7] 自動再開: idx=', currentReadingIdx);
      if (_audioCtx && _audioCtx.state === 'suspended') {
        _audioCtx.resume().then(() => speakItem(currentReadingIdx));
      } else {
        speakItem(currentReadingIdx);
      }
    }
  }, 600);
}

// 画面復帰イベント（iOS・Android共通）
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && isReading) {
    scheduleResume();
  }
});
window.addEventListener('pageshow',  () => { if (isReading) scheduleResume(); });
window.addEventListener('focus',     () => { if (isReading) scheduleResume(); });

// ── HTMLタグ・読み上げ不要な記号を除去 ─────────
function cleanForTTS(text) {
  return (text || '')
    .replace(/<[^>]*>/g, '')        // HTMLタグ除去
    .replace(/&[a-z]+;/gi, '')      // HTMLエンティティ除去（&amp; など）
    .replace(/https?:\/\/\S+/g, '') // URLを除去
    .replace(/[=+*#@^~|]/g, '')    // 記号除去（=,+,*,#など）
    .replace(/\/+/g, '')            // スラッシュ除去
    .replace(/_{2,}/g, '')          // アンダースコア連続除去
    .replace(/\s+/g, ' ')           // 空白を正規化
    .trim();
}

// 実際に発話する共通関数（speakItem の外で定義してコールバックから安全に呼べるようにする）
function doSpeak(item, titleText, summaryText, lang, nextIdx) {
  window.speechSynthesis.cancel(); // 念のため前の発話をキャンセル
  const spokenText = lang === 'en-US'
    ? `${cleanForTTS(titleText)}. ${cleanForTTS(summaryText)}`
    : `${cleanForTTS(item.category)}。${cleanForTTS(titleText)}。${cleanForTTS(summaryText)}`;
  const utt = new SpeechSynthesisUtterance(spokenText);
  utt.lang   = lang;
  utt.rate   = parseFloat(document.getElementById('rateSlider').value);
  utt.volume = parseFloat(document.getElementById('volSlider').value);
  utt.onend  = () => { if (isReading) speakItem(nextIdx); };
  utt.onerror = (e) => {
    console.warn('[AM7] TTS error:', e.error);
    if (isReading) speakItem(nextIdx); // エラーでも次へ進む
  };
  window.speechSynthesis.speak(utt);
}

function speakItem(i) {
  if (!isReading || i >= filteredNews.length) { finishReading(); return; }

  currentReadingIdx = i;
  const item  = filteredNews[i];
  const total = filteredNews.length;

  // カード
  document.querySelectorAll('.news-card').forEach(el => el.classList.remove('reading'));
  const card = document.getElementById(`nc-${i}`);
  if (card) { card.classList.add('reading'); card.scrollIntoView({behavior:'smooth',block:'nearest'}); }

  // Now playing
  document.getElementById('nowPlayingBar').classList.add('show');
  document.getElementById('npTitle').textContent = item.title;
  document.getElementById('npIdx').textContent   = `${i+1}/${total}`;

  // Progress
  document.getElementById('progressLine').style.width = `${((i+1)/total)*100}%`;

  // Media Session更新
  setupMediaSession(item.title);

  if (ttsLang === 'en-US' && item.title_en && item.summary_en) {
    // 英語設定: 取得時に生成済みの英語フィールドをそのまま使用
    doSpeak(item, item.title_en, item.summary_en, 'en-US', i + 1);
  } else if (ttsLang === 'en-US') {
    // 英語フィールドが未取得（古いキャッシュ等）→ 日本語フォールバック
    console.warn('[AM7] 英語フィールドなし。日本語で読み上げ');
    doSpeak(item, item.title, item.summary, 'ja-JP', i + 1);
  } else {
    // 日本語
    doSpeak(item, item.title, item.summary, 'ja-JP', i + 1);
  }
}

async function readAll() {
  if (!filteredNews.length) return;
  stopReading();
  isReading = true;
  document.getElementById('readAllBtn').style.display = 'none';
  document.getElementById('stopBtn').style.display    = '';
  startSilentAudio();        // iOS: オーディオセッション維持
  await requestWakeLock();   // Android: WakeLock取得を待ってから読み上げ開始
  speakItem(0);
}

async function readItem(i) {
  stopReading();
  isReading = true;
  document.getElementById('readAllBtn').style.display = 'none';
  document.getElementById('stopBtn').style.display    = '';
  startSilentAudio();        // iOS: オーディオセッション維持
  await requestWakeLock();   // Android: WakeLock取得を待ってから読み上げ開始
  speakItem(i);
}

function stopReading() {
  isReading = false;
  currentReadingIdx = -1;
  window.speechSynthesis.cancel();
  stopSilentAudio();
  releaseWakeLock();    // WakeLock解放
  clearMediaSession();
  document.querySelectorAll('.news-card').forEach(el => el.classList.remove('reading'));
  document.getElementById('readAllBtn').style.display = '';
  document.getElementById('stopBtn').style.display    = 'none';
  document.getElementById('nowPlayingBar').classList.remove('show');
  document.getElementById('progressLine').style.width = '0%';
}

function finishReading() {
  stopReading();
  document.getElementById('progressLine').style.width = '100%';
  setTimeout(() => document.getElementById('progressLine').style.width = '0%', 1800);
}
</script>
